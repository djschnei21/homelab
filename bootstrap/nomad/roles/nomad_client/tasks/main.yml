---
- name: Set architecture fact
  set_fact:
    arch_cni: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"

- name: Set CNI version
  set_fact:
    cni_version: "v1.6.2"

- name: Create CNI plugins directory
  file:
    path: /opt/cni/bin
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Download and extract CNI plugins
  unarchive:
    src: "https://github.com/containernetworking/plugins/releases/download/{{ cni_version }}/cni-plugins-linux-{{ arch_cni }}-{{ cni_version }}.tgz"
    dest: /opt/cni/bin
    remote_src: yes
    mode: '0755'
    owner: root
    group: root

- name: Install required packages for Docker
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-debian
    state: present

- name: Add Docker GPG key
  ansible.builtin.shell: >
    curl -fsSL https://download.docker.com/linux/debian/gpg |
    gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/docker-archive-keyring.gpg

- name: Remove legacy Docker apt repository list
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/docker.list
    state: absent

- name: Add Docker repository
  ansible.builtin.deb822_repository:
    name: docker
    types:
      - deb
    uris:
      - https://download.docker.com/linux/debian
    suites:
      - "{{ ansible_facts['distribution_release'] }}"
    components:
      - stable
    architectures:
      - "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else ansible_facts['architecture'] }}"
    signed_by: /usr/share/keyrings/docker-archive-keyring.gpg
    install_python_debian: true
    state: present

- name: Install Docker
  apt:
    name: docker-ce
    state: present
    update_cache: yes

- name: Add user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes

- name: Stop package-managed node exporter if present
  ansible.builtin.systemd_service:
    name: prometheus-node-exporter
    state: stopped
    enabled: false
  failed_when: false

- name: Remove default nomad.hcl if present
  file:
    path: /etc/nomad.d/nomad.hcl
    state: absent

- name: Remove server config if switching persona
  file:
    path: /etc/nomad.d/server.hcl
    state: absent

- name: Create Nomad client configuration
  template:
    src: client.hcl.j2
    dest: /etc/nomad.d/client.hcl
    owner: nomad
    group: nomad
  notify:
    - Restart Nomad
